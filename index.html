<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de barras de metalon</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    button { margin-top: 15px; padding: 8px 12px; cursor: pointer; }
    .resultado { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Calculadora de barras de metalon</h1>

  <label>
    Comprimento da estrutura (m):
    <input type="number" id="comprimento" value="10" step="0.01">
  </label>

  <label>
    Altura total (m):
    <input type="number" id="altura" value="1.1" step="0.01">
  </label>

  <label>
    Espaçamento entre montantes (cm):
    <input type="number" id="espacamento" value="8" step="0.1">
  </label>

  <label>
    Número de barrotes horizontais:
    <input type="number" id="barrotes" value="2" step="1">
  </label>

  <label>
    Espessura das barras horizontais (cm) (topo e base):
    <input type="number" id="espessuraBarra" value="3" step="0.1">
  </label>

  <label>
    Comprimento da barra comercial (m):
    <input type="number" id="barra" value="6" step="0.01">
  </label>

  <label>
    Considerar montante nas duas extremidades?
    <input type="checkbox" id="extremidades" checked>
  </label>

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>

  <script>
    function calcular() {
      const comprimento = parseFloat(document.getElementById('comprimento').value);
      const altura = parseFloat(document.getElementById('altura').value);
      const espacamentoCm = parseFloat(document.getElementById('espacamento').value);
      const barrotes = parseInt(document.getElementById('barrotes').value, 10);
      const espessuraBarra = parseFloat(document.getElementById('espessuraBarra').value) / 100; // cm → m
      const barra = parseFloat(document.getElementById('barra').value);
      const extremidades = document.getElementById('extremidades').checked;

      if (
        isNaN(comprimento) || isNaN(altura) || isNaN(espacamentoCm) ||
        isNaN(barrotes) || isNaN(espessuraBarra) || isNaN(barra)
      ) {
        document.getElementById('resultado').innerHTML = 'Preencha todos os campos corretamente.';
        return;
      }

      // altura útil dos montantes (descontando barra superior e inferior)
      const alturaUtil = altura - 2 * espessuraBarra;
      if (alturaUtil <= 0) {
        document.getElementById('resultado').innerHTML =
          'A espessura das barras horizontais é maior ou igual à altura total.';
        return;
      }

      const espacamento = espacamentoCm / 100; // cm → m

      // número de vãos
      const vaos = comprimento / espacamento;

      // montantes verticais
      let montantes = Math.floor(vaos);
      if (extremidades) {
        montantes += 1; // fecha na outra ponta
      }

      // quantas peças verticais saem de uma barra comercial
      const pecasVertPorBarra = Math.floor(barra / alturaUtil);
      const barrasMontantes = pecasVertPorBarra > 0
        ? Math.ceil(montantes / pecasVertPorBarra)
        : 0;

      // barrotes horizontais: cada um tem o comprimento total
      const pecasHorizPorBarra = Math.floor(barra / comprimento);
      const barrasBarrotes = pecasHorizPorBarra > 0
        ? Math.ceil(barrotes / pecasHorizPorBarra)
        : 0;

      const totalBarras = barrasMontantes + barrasBarrotes;

      document.getElementById('resultado').innerHTML = `
        <b>Altura útil dos montantes:</b> ${alturaUtil.toFixed(3)} m<br>
