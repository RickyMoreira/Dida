<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cálculo de Metalon</title>
<style>
  body { font-family: Arial; max-width: 600px; margin: 20px auto; }
  input { width: 100%; padding: 8px; margin: 5px 0; }
  button { padding: 10px; width: 100%; margin-top: 10px; }
  .resultado { margin-top: 20px; padding: 15px; background: #f0f0f0; }
</style>
</head>
<body>

<h2>Calculadora de Barras Verticais com Desconto do Metalon</h2>

<label>Altura total da estrutura (m):</label>
<input type="number" id="altura" step="0.01">

<label>Comprimento da estrutura (m):</label>
<input type="number" id="comprimento" step="0.01">

<label>Espaçamento entre barras verticais (m):</label>
<input type="number" id="espacamento" step="0.01">

<label>Quantidade de barras horizontais:</label>
<input type="number" id="qtdHorizontais">

<label>Medida do metalon (ex: 20x30):</label>
<input type="text" id="metalon">

<label>Comprimento da barra comercial (m):</label>
<input type="number" id="barraComercial" step="0.01">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

<script>
function calcular() {
    const altura = parseFloat(document.getElementById("altura").value);
    const comprimento = parseFloat(document.getElementById("comprimento").value);
    const espacamento = parseFloat(document.getElementById("espacamento").value);
    const qtdHorizontais = parseInt(document.getElementById("qtdHorizontais").value);
    const metalon = document.getElementById("metalon").value;
    const barraComercial = parseFloat(document.getElementById("barraComercial").value);

    // Extrair menor medida do metalon (ex: 20x30 → 20)
    const partes = metalon.toLowerCase().split("x");
    const medida1 = parseFloat(partes[0]);
    const medida2 = parseFloat(partes[1]);
    const menor = Math.min(medida1, medida2) / 1000; // converter mm → metros

    // Desconto total nas barras verticais
    const descontoTotal = qtdHorizontais * menor;

    // Altura útil final
    const alturaUtil = altura - descontoTotal;

    // Número de montantes (fechado dos dois lados)
    const montantes = Math.floor(comprimento / espacamento) + 2;

    // Total de metros verticais
    const totalVertical = montantes * alturaUtil;

    // Quantidade de barras comerciais necessárias
    const barrasComerciais = Math.ceil(totalVertical / barraComercial);

    document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>
        <p><b>Menor medida do metalon:</b> ${menor * 1000} mm</p>
        <p><b>Altura útil das barras verticais:</b> ${alturaUtil.toFixed(3)} m</p>
        <p><b>Quantidade de montantes:</b> ${montantes}</p>
        <p><b>Total de metros verticais:</b> ${totalVertical.toFixed(2)} m</p>
        <p><b>Barras comerciais necessárias:</b> ${barrasComerciais}</p>
    `;
}
</script>

</body>
</html>
