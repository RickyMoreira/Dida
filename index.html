<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- OPEN GRAPH PARA WHATSAPP -->
<meta property="og:title" content="Acesse Agora">
<meta property="og:description" content="Clique para abrir o site.">
<meta property="og:image" content="https://rickymoreira.github.io/Dida/Imagem.jpg">
<meta property="og:url" content="https://rickymoreira.github.io/Dida/">

<!-- RESPONSIVIDADE -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cálculo de metalon (verticais + horizontais)</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        color: #222;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 95%;
        margin: auto;
        padding: 1.2rem;
        background: #fff;
        margin-top: 1rem;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        font-size: 1.6rem;
        margin-bottom: 1rem;
    }

    label {
        font-size: 1.1rem;
        margin-top: 0.8rem;
        display: block;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        font-size: 1.1rem;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 14px;
        margin-top: 1.2rem;
        font-size: 1.2rem;
        background: #0077ff;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
    }

    button:active {
        background: #005fcc;
    }

    .resultado {
        margin-top: 20px;
        padding: 15px;
        background: #e9e9e9;
        border-radius: 8px;
        font-size: 1.1rem;
    }
</style>

</head>
<body>

<div class="container">

<h2>Calculadora de barras de metalon</h2>

<label>Altura total da estrutura (m):</label>
<input type="number" id="altura" step="0.01">

<label>Comprimento da estrutura (m):</label>
<input type="number" id="comprimento" step="0.01">

<label>Espaçamento entre barras verticais (m):</label>
<input type="number" id="espacamento" step="0.01">

<label>Quantidade de barras horizontais:</label>
<input type="number" id="qtdHorizontais">

<label>Medida do metalon (ex: 20x30):</label>
<input type="text" id="metalon">

<label>Comprimento da barra comercial (m):</label>
<input type="number" id="barraComercial" step="0.01">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script>
function calcular() {
    const altura = parseFloat(document.getElementById("altura").value);
    const comprimento = parseFloat(document.getElementById("comprimento").value);
    const espacamento = parseFloat(document.getElementById("espacamento").value);
    const qtdHorizontais = parseInt(document.getElementById("qtdHorizontais").value);
    const metalon = document.getElementById("metalon").value;
    const barraComercial = parseFloat(document.getElementById("barraComercial").value);

    if ([altura, comprimento, espacamento, qtdHorizontais, barraComercial].some(v => !v || v <= 0) || !metalon.includes("x")) {
        document.getElementById("resultado").innerHTML = "<p>Preencha todos os campos corretamente.</p>";
        return;
    }

    const partes = metalon.toLowerCase().split("x");
    const medida1 = parseFloat(partes[0]);
    const medida2 = parseFloat(partes[1]);
    const menor = Math.min(medida1, medida2) / 1000;

    const descontoTotal = qtdHorizontais * menor;
    const alturaUtil = altura - descontoTotal;

    const montantes = Math.floor(comprimento / espacamento) + 1;

    const totalVertical = montantes * alturaUtil;
    const totalHorizontal = qtdHorizontais * comprimento;

    const totalMetros = totalVertical + totalHorizontal;

    const barrasComerciais = Math.ceil(totalMetros / barraComercial);

    document.getElementById("resultado").innerHTML = `
        <h3>Resultado</h3>
        <p><b>Altura útil de cada barra vertical:</b> ${alturaUtil.toFixed(3)} m</p>
        <p><b>Quantidade de barras verticais:</b> ${montantes}</p>
        <p><b>Total de metros verticais:</b> ${totalVertical.toFixed(2)} m</p>
        <p><b>Total de metros horizontais:</b> ${totalHorizontal.toFixed(2)} m</p>
        <p><b>Total geral de metalon:</b> ${totalMetros.toFixed(2)} m</p>
        <p><b>Barras comerciais necessárias:</b> ${barrasComerciais}</p>
    `;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
